steps:
# 1. Build the Docker image using your Dockerfile
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/pr-reviewer:$COMMIT_SHA', '.']

# 2. Push the built image to Google Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/pr-reviewer:$COMMIT_SHA']

# 3. Deploy the image to your Cloud Run service
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'pr-reviewer' # Your Cloud Run service name
  - '--image'
  - 'gcr.io/$PROJECT_ID/pr-reviewer:$COMMIT_SHA'
  - '--region'
  - 'us-central1' # Your region based on your screenshot

# 4. THE MAGIC FIX: Tell the Compute account to stop complaining about logs
options:
  logging: CLOUD_LOGGING_ONLY