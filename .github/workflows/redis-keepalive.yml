name: Redis Keepalive

# Runs every 5 days to prevent Redis Cloud free-tier deletion due to inactivity
on:
  schedule:
    - cron: '0 8 */5 * *'  # Every 5 days at 8:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  ping-redis:
    runs-on: ubuntu-latest
    steps:
      - name: Install redis
        run: pip install redis

      - name: Ping Redis
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python3 -c "
          import redis, os, datetime
          r = redis.from_url(os.environ['REDIS_URL'], decode_responses=True)
          print('PING:', r.ping())
          ts = datetime.datetime.utcnow().isoformat() + 'Z'
          r.set('keepalive:last_ping', ts, ex=604800)
          print(f'SET keepalive:last_ping = {ts}')
          print('✅ Redis keepalive successful')
          "
